<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error {
            color: red;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Employee Registration Form</h2>

    <form id="empForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name">
            <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
            <label>Email ID</label>
            <input type="email" id="email">
            <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="mobile">
            <small class="error" id="mobileError"></small>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea id="address"></textarea>
            <small class="error" id="addressError"></small>
        </div>

        <div class="row">
            <div class="form-group">
                <label>State</label>
                <input type="text" value="Maharashtra" readonly>
            </div>

            <div class="form-group">
                <label>Country</label>
                <input type="text" value="India" readonly>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" id="empId">
                <small class="error" id="empIdError"></small>
            </div>

            <div class="form-group">
                <label>Department</label>
                <select id="dept">
                    <option value="">Select</option>
                    <option>IT</option>
                    <option>HR</option>
                    <option>Finance</option>
                    <option>Marketing</option>
                </select>
                <small class="error" id="deptError"></small>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Designation</label>
                <input type="text" id="designation">
                <small class="error" id="designationError"></small>
            </div>

            <div class="form-group">
                <label>Date of Joining</label>
                <input type="date" id="doj">
                <small class="error" id="dojError"></small>
            </div>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>
            <small class="error" id="genderError"></small>
        </div>

        <div class="form-group">
            <label>Skills</label>
            <input type="text" id="skills">
            <small class="error" id="skillsError"></small>
        </div>

        <button type="submit">Register</button>
    </form>
</div>

<script>
document.getElementById("empForm").addEventListener("submit", function(e) {

    let isValid = true;

    // Clear old errors
    document.querySelectorAll(".error").forEach(el => el.innerText = "");

    // Get values
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let mobile = document.getElementById("mobile").value.replace(/\D/g,'');
    let address = document.getElementById("address").value.trim();
    let empId = document.getElementById("empId").value.trim();
    let dept = document.getElementById("dept").value;
    let designation = document.getElementById("designation").value.trim();
    let doj = document.getElementById("doj").value;
    let skills = document.getElementById("skills").value.trim();
    let gender = document.querySelector('input[name="gender"]:checked');

    // Regex
    let nameRegex = /^[A-Za-z ]{3,50}$/;
    let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    let mobileRegex = /^[6-9][0-9]{9}$/;
    let empIdRegex = /^EMP[0-9]{4}$/;
    let skillsRegex = /^[A-Za-z, ]{3,100}$/;

    // Validation
    if (!nameRegex.test(name)) {
        document.getElementById("nameError").innerText = "Enter valid name";
        isValid = false;
    }

    if (!emailRegex.test(email)) {
        document.getElementById("emailError").innerText = "Enter valid email";
        isValid = false;
    }

    if (!mobileRegex.test(mobile)) {
        document.getElementById("mobileError").innerText = "Enter valid mobile number";
        isValid = false;
    }

    if (address.length < 10) {
        document.getElementById("addressError").innerText = "Minimum 10 characters required";
        isValid = false;
    }

    if (!empIdRegex.test(empId)) {
        document.getElementById("empIdError").innerText = "Format: EMP1234";
        isValid = false;
    }

    if (dept === "") {
        document.getElementById("deptError").innerText = "Select department";
        isValid = false;
    }

    if (designation.length < 2) {
        document.getElementById("designationError").innerText = "Enter valid designation";
        isValid = false;
    }

    if (doj === "") {
        document.getElementById("dojError").innerText = "Select joining date";
        isValid = false;
    }

    if (!gender) {
        document.getElementById("genderError").innerText = "Select gender";
        isValid = false;
    }

    if (!skillsRegex.test(skills)) {
        document.getElementById("skillsError").innerText = "Enter valid skills";
        isValid = false;
    }

    // Stop submit if invalid
    if (!isValid) {
        e.preventDefault();
    }
});
</script>

</body>
</html>
